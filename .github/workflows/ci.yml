name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least privilege: CI only reads the repository. Jobs that need more must
# request it explicitly at the job level.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Verify formatting
        run: bun run fmt:check
      - name: Run linter
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate version.ts
        run: bun run scripts/generate-version.ts
      - name: Type check
        run: bun run check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate version.ts
        run: bun run scripts/generate-version.ts
      - name: Run tests
        run: bun run test -- packages/core/src

  # Deno runtime smoke test - verifies the Deno runtime implementation works
  # Exception to the toolchain rule: Deno is intentionally not in the Nix dev
  # shell (flake.nix) because it's not needed for local development (dev uses
  # Bun). It's only needed for JSR distribution testing, so we use
  # denoland/setup-deno directly here.
  deno-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - name: Run Deno smoke tests
        run: deno test --allow-env --allow-read --allow-run packages/core/src/runtime/deno/smoke.test.ts

  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            name: linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            name: linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            name: darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            name: darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            name: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate version.ts
        run: bun run scripts/generate-version.ts
      - name: Build binary (${{ matrix.name }})
        run: bun run scripts/build.ts --target ${{ matrix.target }} --output vibe-${{ matrix.name }}

  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            target: bun-linux-x64
          - arch: arm64
            target: bun-linux-arm64
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Generate version.ts
        run: bun run scripts/generate-version.ts
      - name: Build Linux binary
        run: bun run scripts/build.ts --target ${{ matrix.target }} --output vibe-test
      - name: Build .deb package
        run: |
          VERSION=$(bun run scripts/get-version.ts)
          bun run scripts/build-deb.ts "$VERSION" ${{ matrix.arch }} vibe-test

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-toolchain

      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --filter @kexi/vibe-native --ignore-scripts

      - name: Build native module
        working-directory: packages/native
        run: pnpm exec napi build --platform --release --target ${{ matrix.target }}

  e2e-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain

      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}

      # Install build dependencies for node-pty (Linux only)
      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      # Install all dependencies
      - name: Install dependencies
        run: pnpm install --ignore-scripts

      # Generate version.ts for vibe
      - name: Generate version.ts
        run: bun run scripts/generate-version.ts

      # Build vibe binary for E2E tests
      - name: Build vibe binary for E2E tests
        run: bun run scripts/build.ts --output vibe-e2e

      # Build node-pty native addon from source
      - name: Build node-pty
        run: |
          cd node_modules/node-pty
          npm run install -- --build-from-source
        env:
          npm_config_build_from_source: true

      # Verify binary exists and has execute permission
      - name: Verify vibe binary
        run: |
          ls -la vibe-e2e
          file vibe-e2e
          chmod +x vibe-e2e
          ./vibe-e2e --version

      # Run E2E tests with Vitest
      - name: Run E2E tests
        run: pnpm -C packages/e2e run test
        env:
          VIBE_BINARY_PATH: ${{ github.workspace }}/vibe-e2e

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - uses: ./.github/actions/setup-takumi-guard
        with:
          api-key: ${{ secrets.TAKUMI_GUARD_API_KEY }}
      - name: Install dependencies
        run: pnpm install --filter docs --frozen-lockfile --ignore-scripts
      - name: Lint
        run: pnpm -C packages/docs lint
      - name: Format check
        run: pnpm -C packages/docs format
      - name: Type check
        run: pnpm -C packages/docs check
      - name: Build
        run: pnpm -C packages/docs build

  pinact-verify:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
      - run: pinact run --check

  gitleaks:
    runs-on: ubuntu-latest
    # The action comments on the PR via GITHUB_TOKEN, which needs write access to
    # pull requests. Granted only here, not at the top level, so every other job
    # keeps the read-only default. contents:read is restated because declaring
    # job-level permissions drops the inherited top-level set otherwise.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      # fetch-depth: 0 so the action can resolve the PR's base ref and scan
      # every commit in the range (not just the tip), catching a secret added in
      # an intermediate commit even if a later commit removes it. On push it
      # scans the full history of the pushed ref.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # Why the official action instead of the dev-shell gitleaks via a plain
      # `run:` step: it bundles a maintained scanner and posts findings as PR
      # comments. setup-toolchain is dropped since the action ships its own
      # gitleaks binary.
      #
      # Note on config tampering: the action's config precedence is the same as
      # the CLI's (GITLEAKS_CONFIG env / repo-root .gitleaks.toml), so it does
      # NOT prevent a fork PR from editing .gitleaks.toml in the same PR. That
      # evasion is blocked operationally: CODEOWNERS guards .gitleaks.toml and
      # branch protection requires this check to pass before merge.
      #
      # GITLEAKS_LICENSE is required for organization repos only; kexi/vibe is a
      # personal repo, so it is intentionally omitted.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  build:
    needs: [build-binaries, build-deb, build-native]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - run: echo "All builds completed successfully"
