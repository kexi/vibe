name: Setup toolchain
description: >-
  Provision the development toolchain. On Linux/macOS this enters the Nix flake
  dev shell (single source of truth in flake.nix) and exposes its tools to later
  steps; on Windows, where Nix is unavailable, it falls back to individual setup
  actions pinned to the same versions.
runs:
  using: composite
  steps:
    # --- Linux/macOS: Nix flake dev shell ---
    - name: Install Nix
      if: runner.os != 'Windows'
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
    # Cache the Nix store via the standard GitHub Actions cache (actions/cache
    # under the hood). Unlike magic-nix-cache, this does not reverse-engineer
    # GitHub's cache API, so it is not subject to the 418/429 throttling that
    # made CI flaky. Keyed on the flake inputs so the cache invalidates only
    # when the toolchain changes; restore-prefixes lets unrelated changes still
    # reuse the previous store. purge is left off so no `actions: write`
    # permission is required.
    - name: Nix store cache
      if: runner.os != 'Windows'
      uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
    - name: Load dev shell into environment
      if: runner.os != 'Windows'
      shell: bash
      env:
        MISE_HTTP_TIMEOUT: "120"
      run: |
        # Build the flake dev shell once and expose only its declared tool
        # directories on PATH for all subsequent run steps, so they need no
        # `nix develop --command` prefix and stay identical to the Windows path.
        # We export just these tools (not the whole shell PATH) so the system
        # C toolchain stays in front for node-gyp (node-pty) and rustup linking.
        nix develop --command bash -c '
          for t in node bun pnpm ruby rustup pinact git; do
            dirname "$(command -v "$t")"
          done' | sort -u >> "$GITHUB_PATH"
        echo "SHARP_IGNORE_GLOBAL_LIBVIPS=1" >> "$GITHUB_ENV"

    # --- Windows: individual setup actions (Nix does not run on Windows) ---
    - name: Setup Bun (Windows)
      if: runner.os == 'Windows'
      uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
      with:
        bun-version: 1.3.8
    - name: Setup Node.js (Windows)
      if: runner.os == 'Windows'
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
      with:
        node-version: 24.13.0
    - name: Setup pnpm (Windows)
      if: runner.os == 'Windows'
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        version: 10.26.2
    # Rust is provided by Nix on Linux/macOS, but Nix does not run on Windows, so
    # the Windows build/test jobs need rustup here. Pin the channel to match
    # rust-toolchain.toml; the targets list pulls the Windows MSVC target.
    - name: Setup Rust (Windows)
      if: runner.os == 'Windows'
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: 1.92.0
        targets: x86_64-pc-windows-msvc
        components: rustfmt, clippy
    # aws-lc-sys (rustls' aws-lc-rs crypto provider) builds C/asm; its asm path on
    # Windows needs NASM, which is not on the windows-latest PATH by default.
    - name: Setup NASM (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1.5.2
